name: miptd
channels:
  - pytorch
  - bioconda
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - mamba
  - nodejs
  - pytorch
  - rdkit
  - r-base
  - r-tidyverse
  - r-readxl
  - r-writexl
  - r-ggvenn
  - r-jsonlite
  - bioconductor-clusterprofiler
  - bioconductor-org.hs.eg.db
  - r-ggnewscale
  - r-circlize
  - bioconductor-complexheatmap
  - matplotlib-base
  - pillow
  # NOTE: the R package `legendry` is not on conda-forge/bioconda yet.
  # It is installed from CRAN by `scripts/install_miptd.sh` (Step 4):
  #   Rscript -e "install.packages('legendry', repos='https://cloud.r-project.org')"
  - pip:
      - chemprop==2.2.2
      - requests>=2.31.0
      - beautifulsoup4>=4.12.0
      - playwright>=1.53.0
